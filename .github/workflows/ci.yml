name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java:
    name: Java modules (faro-core, faro-flink)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and test
        run: ./gradlew test

  python-cli:
    name: Python CLI (faro-cli)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faro-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hatch
        run: pip install hatch

      - name: Test
        run: hatch run pytest

  python-api:
    name: Python API (faro-api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faro-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hatch
        run: pip install hatch

      - name: Test
        run: hatch run pytest
